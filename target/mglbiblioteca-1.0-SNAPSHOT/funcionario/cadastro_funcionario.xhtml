<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../WEB-INF/templates/template_funcionario.xhtml">

            <ui:define name="top">
                Ficha do Funcionario
            </ui:define>



            <ui:define name="content">
                <h:form id="frmCadastroFuncionario"> 
                    <p:growl id="msgs" showDetail="true" life="3000"/>

                    <p:panel header="#{funcionarioBean.funcionario.idFuncionario == null ? 'Registar Novo Funcionario' : 'Editar Funcionario'}" 
                             style="max-width:800px; margin: 0 auto; margin-bottom:20px;">

                        <h:inputHidden value="#{funcionarioBean.funcionario.idFuncionario}" />

                        <h:panelGrid columns="2" cellpadding="7" style="width:100%;">

                            <h:outputLabel value="Código do Funcionario:" for="idFuncionario" style="font-weight: bold;" rendered="#{funcionarioBean.funcionario.idFuncionario != null}" />
                            <p:inputText id="idLivro" value="#{funcionarioBean.funcionario.idFuncionario}" readonly="true" style="width:100%" rendered="#{funcionarioBean.funcionario.idFuncionario != null}" />

                            <h:outputLabel value="Nome do Funcionario:" for="nome" style="font-weight: bold;" />
                            <p:inputText id="titulo" value="#{funcionarioBean.funcionario.nome}" 
                                         required="true" requiredMessage="O nome do funcionario é obrigatório" style="width:100%"/>

                            <h:outputLabel value="Cargo" for="cargo" style="font-weight: bold;" />
                            <p:inputText id="cargo" value="#{funcionarioBean.funcionario.cargo}" 
                                         required="true" requiredMessage="O cargo é obrigatório" style="width:100%"/>

                            <h:outputLabel value="Email:" for="email" style="font-weight: bold;" />
                            <p:inputText id="email" value="#{funcionarioBean.funcionario.email}" 
                                         required="true" requiredMessage="O email é obrigatória" style="width:100%"/>

                            <h:outputLabel value="Número do Telefone" for="telefone" style="font-weight: bold;" />
                            <p:inputMask id="telefone" 
                                         value="#{funcionarioBean.funcionario.telefone}" 
                                         mask="(+24) 999 999 999"
                                         required="true"
                                         requiredMessage="Telefone é obrigatório" />
                        </h:panelGrid>
                        <p:divider />

                        <div style="text-align: center; margin-top: 15px;">
                            <p:commandButton value="Guardar Funcionario" action="#{funcionarioBean.salvar}" 
                                             update="frmCadastroFuncionario" icon="pi pi-save" 
                                             styleClass="ui-button-success" style="margin-right: 10px;" />

                            <p:commandButton value="Limpar Novo" action="#{funcionarioBean.limparPesquisa}" 
                                             update="frmCadastroFuncionario" icon="pi pi-refresh" process="@this" 
                                             styleClass="ui-button-secondary" />
                        </div>
                    </p:panel>
                    <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                        <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                        <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
                    </p:confirmDialog>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
