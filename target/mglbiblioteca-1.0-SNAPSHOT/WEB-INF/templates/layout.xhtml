<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    
    <title><ui:insert name="title">MGLBiblioteca - Sistema de Gestão</ui:insert></title>
    
    <!-- ============================================ -->
    <!-- CSS EXTERNO - Bootstrap 5 -->
    <!-- ============================================ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" 
          rel="stylesheet"/>
    
    <!-- ============================================ -->
    <!-- CSS EXTERNO - Font Awesome 6 -->
    <!-- ============================================ -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <!-- ============================================ -->
    <!-- CSS EXTERNO - Google Fonts -->
    <!-- ============================================ -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" 
          rel="stylesheet"/>
    
    <!-- ============================================ -->
    <!-- CSS PERSONALIZADO - MGLBiblioteca -->
    <!-- ============================================ -->
    <style>
        /* ============================================
           VARIÁVEIS - PALETA MGLBIBLIOTECA
           ============================================ */
        :root {
            /* Cores Principais */
            --primary: #2C3E50;
            --primary-dark: #1a252f;
            --primary-light: #34495E;
            --secondary: #8E44AD;
            --secondary-dark: #6C3483;
            --secondary-light: #A569BD;
            --accent: #F39C12;
            --accent-dark: #D4AC0D;
            --accent-light: #F5B041;
            
            /* Cores Neutras */
            --background: #F8F9FA;
            --white: #FFFFFF;
            --text: #2C3E50;
            --text-light: #7F8C8D;
            --border: #E5E7EB;
            
            /* Cores Funcionais */
            --success: #27AE60;
            --success-dark: #1E8449;
            --danger: #E74C3C;
            --danger-dark: #C0392B;
            --warning: #F39C12;
            --info: #3498DB;
            
            /* Sombras */
            --shadow-sm: 0 2px 4px rgba(44, 62, 80, 0.08);
            --shadow-md: 0 4px 12px rgba(44, 62, 80, 0.12);
            --shadow-lg: 0 8px 24px rgba(44, 62, 80, 0.16);
            --shadow-xl: 0 12px 36px rgba(44, 62, 80, 0.20);
            
            /* Espaçamentos */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            /* Transições */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
            
            /* Fontes */
            --font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ============================================
           RESET E BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--background);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: var(--secondary);
            transition: var(--transition-normal);
        }

        a:hover {
            color: var(--secondary-dark);
        }

        /* ============================================
           SCROLLBAR PERSONALIZADA
           ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--background);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 4px;
            transition: var(--transition-normal);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* ============================================
           NAVBAR - Cabeçalho Principal
           ============================================ */
        .navbar-mgl {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 0.8rem 1.5rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 1050;
            backdrop-filter: blur(10px);
        }

        .navbar-mgl .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--white) !important;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition-normal);
        }

        .navbar-mgl .navbar-brand:hover {
            transform: scale(1.02);
        }

        .navbar-mgl .navbar-brand i {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .navbar-mgl .navbar-brand span {
            color: var(--accent);
        }

        .navbar-mgl .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
            padding: 0.6rem 1.2rem !important;
            border-radius: var(--radius-sm);
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .navbar-mgl .nav-link:hover {
            color: var(--white) !important;
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .navbar-mgl .nav-link i {
            font-size: 1.1rem;
        }

        .navbar-mgl .nav-link.active {
            color: var(--white) !important;
            background: rgba(255, 255, 255, 0.2);
        }

        .navbar-mgl .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.3);
            padding: 0.5rem 0.75rem;
        }

        .navbar-mgl .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        /* Badge de Notificações */
        .navbar-mgl .notification-badge {
            position: relative;
        }

        .navbar-mgl .notification-badge .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: var(--white);
            font-size: 0.6rem;
            padding: 0.2rem 0.5rem;
            border-radius: 50px;
            font-weight: 700;
            border: 2px solid var(--white);
        }

        /* ============================================
           SIDEBAR - Menu Lateral (Opcional)
           ============================================ */
        .sidebar-mgl {
            background: var(--white);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
            height: 100%;
            min-height: calc(100vh - 72px);
            box-shadow: var(--shadow-sm);
        }

        .sidebar-mgl .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-mgl .sidebar-header h6 {
            color: var(--text-light);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .sidebar-mgl .nav-item {
            padding: 0 0.5rem;
        }

        .sidebar-mgl .nav-link {
            color: var(--text);
            padding: 0.7rem 1.2rem;
            border-radius: var(--radius-sm);
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .sidebar-mgl .nav-link:hover {
            background: var(--background);
            color: var(--secondary);
        }

        .sidebar-mgl .nav-link.active {
            background: var(--secondary);
            color: var(--white);
        }

        .sidebar-mgl .nav-link i {
            font-size: 1.1rem;
            width: 1.5rem;
            text-align: center;
        }

        .sidebar-mgl .nav-link .badge {
            margin-left: auto;
            background: var(--secondary);
            color: var(--white);
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
        }

        /* ============================================
           CONTEÚDO PRINCIPAL
           ============================================ */
        .main-content {
            padding: 2rem;
            flex: 1;
        }

        /* ============================================
           PAGE HEADER
           ============================================ */
        .page-header {
            padding: 0 0 1.5rem 0;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header .page-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-header .page-title i {
            color: var(--secondary);
            font-size: 1.8rem;
        }

        .page-header .page-subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .page-header .page-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* ============================================
           BREADCRUMB
           ============================================ */
        .breadcrumb-mgl {
            background: transparent;
            padding: 0;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .breadcrumb-mgl .breadcrumb-item {
            color: var(--text-light);
        }

        .breadcrumb-mgl .breadcrumb-item a {
            color: var(--secondary);
        }

        .breadcrumb-mgl .breadcrumb-item a:hover {
            color: var(--secondary-dark);
        }

        .breadcrumb-mgl .breadcrumb-item.active {
            color: var(--text);
            font-weight: 600;
        }

        /* ============================================
           CARDS
           ============================================ */
        .card-mgl {
            background: var(--white);
            border: none;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-normal);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .card-mgl:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .card-mgl .card-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            padding: 1rem 1.5rem;
            border: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-mgl .card-header .card-title {
            color: var(--white);
            margin: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-mgl .card-header .card-title i {
            font-size: 1.2rem;
        }

        .card-mgl .card-body {
            padding: 1.5rem;
        }

        .card-mgl .card-footer {
            background: var(--background);
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
        }

        /* Variantes de Cards */
        .card-mgl.card-primary .card-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
        }

        .card-mgl.card-secondary .card-header {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
        }

        .card-mgl.card-success .card-header {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
        }

        .card-mgl.card-warning .card-header {
            background: linear-gradient(135deg, var(--warning), var(--accent-dark));
        }

        .card-mgl.card-danger .card-header {
            background: linear-gradient(135deg, var(--danger), var(--danger-dark));
        }

        /* ============================================
           STATS CARDS
           ============================================ */
        .stats-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-normal);
            border-left: 4px solid var(--secondary);
            position: relative;
            overflow: hidden;
        }

        .stats-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(142, 68, 173, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .stats-card .stats-icon {
            font-size: 2.5rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .stats-card .stats-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
        }

        .stats-card .stats-label {
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stats-card .stats-change {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .stats-card .stats-change.up {
            background: #d4edda;
            color: #155724;
        }

        .stats-card .stats-change.down {
            background: #f8d7da;
            color: #721c24;
        }

        /* Cores diferentes para stats cards */
        .stats-card.primary { border-left-color: var(--primary); }
        .stats-card.primary .stats-icon { color: var(--primary); }
        
        .stats-card.secondary { border-left-color: var(--secondary); }
        .stats-card.secondary .stats-icon { color: var(--secondary); }
        
        .stats-card.success { border-left-color: var(--success); }
        .stats-card.success .stats-icon { color: var(--success); }
        
        .stats-card.warning { border-left-color: var(--warning); }
        .stats-card.warning .stats-icon { color: var(--warning); }
        
        .stats-card.danger { border-left-color: var(--danger); }
        .stats-card.danger .stats-icon { color: var(--danger); }

        /* ============================================
           BOTÕES
           ============================================ */
        .btn-mgl {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition-normal);
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-mgl-primary {
            background: var(--secondary);
            color: var(--white);
        }
        .btn-mgl-primary:hover {
            background: var(--secondary-dark);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-mgl-secondary {
            background: var(--primary);
            color: var(--white);
        }
        .btn-mgl-secondary:hover {
            background: var(--primary-dark);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-mgl-success {
            background: var(--success);
            color: var(--white);
        }
        .btn-mgl-success:hover {
            background: var(--success-dark);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-mgl-danger {
            background: var(--danger);
            color: var(--white);
        }
        .btn-mgl-danger:hover {
            background: var(--danger-dark);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-mgl-warning {
            background: var(--warning);
            color: var(--white);
        }
        .btn-mgl-warning:hover {
            background: var(--accent-dark);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-mgl-outline {
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
        }
        .btn-mgl-outline:hover {
            background: var(--secondary);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-mgl-sm {
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
        }

        .btn-mgl-lg {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
        }

        /* ============================================
           TABELAS
           ============================================ */
        .table-mgl {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .table-mgl thead {
            background: var(--primary);
            color: var(--white);
        }

        .table-mgl thead th {
            padding: 0.75rem 1rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .table-mgl tbody td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .table-mgl tbody tr {
            transition: var(--transition-fast);
        }

        .table-mgl tbody tr:hover {
            background: #f8f4fa;
        }

        .table-mgl tbody tr:last-child td {
            border-bottom: none;
        }

        .table-mgl .status-badge {
            display: inline-block;
            padding: 0.2rem 0.75rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .table-mgl .status-badge.active {
            background: #d4edda;
            color: #155724;
        }

        .table-mgl .status-badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        .table-mgl .status-badge.inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .table-mgl .status-badge.info {
            background: #cce5ff;
            color: #004085;
        }

        /* ============================================
           FORMULÁRIOS
           ============================================ */
        .form-mgl .form-group {
            margin-bottom: 1.25rem;
        }

        .form-mgl .form-label {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.3rem;
            display: block;
        }

        .form-mgl .form-label .required {
            color: var(--danger);
            margin-left: 0.2rem;
        }

        .form-mgl .form-control,
        .form-mgl .form-select {
            width: 100%;
            padding: 0.65rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            transition: var(--transition-normal);
            font-family: var(--font-family);
            color: var(--text);
            background: var(--white);
        }

        .form-mgl .form-control:focus,
        .form-mgl .form-select:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(142, 68, 173, 0.15);
            outline: none;
        }

        .form-mgl .form-control.is-invalid {
            border-color: var(--danger);
        }

        .form-mgl .form-control.is-valid {
            border-color: var(--success);
        }

        .form-mgl .form-text {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .form-mgl .form-control-lg {
            padding: 0.8rem 1.2rem;
            font-size: 1.05rem;
        }

        .form-mgl .form-control-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        /* ============================================
           ALERTAS E MENSAGENS
           ============================================ */
        .alert-mgl {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            border: none;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .alert-mgl .alert-icon {
            font-size: 1.3rem;
            margin-top: 0.1rem;
        }

        .alert-mgl-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid var(--success);
        }

        .alert-mgl-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid var(--danger);
        }

        .alert-mgl-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid var(--warning);
        }

        .alert-mgl-info {
            background: #cce5ff;
            color: #004085;
            border-left: 4px solid var(--info);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer-mgl {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            padding: 2rem 0;
            margin-top: auto;
            border-top: 3px solid var(--secondary);
        }

        .footer-mgl .footer-brand {
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-mgl .footer-brand i {
            color: var(--accent);
        }

        .footer-mgl .footer-brand span {
            color: var(--accent);
        }

        .footer-mgl .footer-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .footer-mgl .footer-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: var(--transition-normal);
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .footer-mgl .footer-link:hover {
            color: var(--accent);
            transform: translateX(3px);
        }

        .footer-mgl .social-links {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .footer-mgl .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1rem;
            transition: var(--transition-normal);
        }

        .footer-mgl .social-links a:hover {
            background: var(--accent);
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* ============================================
           RESPONSIVIDADE
           ============================================ */
        @media (max-width: 992px) {
            .navbar-mgl .navbar-brand {
                font-size: 1.2rem;
            }
            
            .sidebar-mgl {
                min-height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            
            .main-content {
                padding: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .navbar-mgl {
                padding: 0.5rem 1rem;
            }
            
            .navbar-mgl .navbar-brand {
                font-size: 1rem;
            }
            
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .page-header .page-title {
                font-size: 1.3rem;
