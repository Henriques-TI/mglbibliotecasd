<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="jakarta.faces.html">

    <body>
        <ui:composition template="./../WEB-INF/templates/template_livro.xhtml">

            <ui:define name="content">
                <f:view>
                    
                    <h:form id="formPesquisa">
                        <p:growl id="growl" showDetail="true" sticky="false" life="4000" />

                        <p:toolbar>
                            <p:toolbarGroup align="left">

                                <p:inputText id="pesquisa"
                                             value="#{livroBean.filtroAutor}"
                                             placeholder="Pesquisar por título ou autor..."
                                             style="width: 400px;" />

                                <p:commandButton value="Pesquisar"
                                                 icon="pi pi-search"
                                                 action="#{livroBean.pesquisar}"
                                                 update="formTabela:tabela"
                                                 style="margin-left: 8px;" />

                                <p:commandButton value="Listar Todos"
                                                 icon="pi pi-list"
                                                 action="#{livroBean.limparPesquisa}"
                                                 update="formPesquisa:pesquisa formTabela:tabela"
                                                 styleClass="ui-button-secondary"
                                                 style="margin-left: 4px;"
                                                 immediate="true">
                                    <f:setPropertyActionListener value=""
                                                                 target="#{livroBean.filtroTitulo}" />
                                </p:commandButton>

                            </p:toolbarGroup>
                        </p:toolbar>
                    </h:form>

                    <h:form id="formTabela">

                        <p:dataTable id="tabela"
                                     value="#{livroBean.livros}"
                                     var="liv"
                                     paginator="true"
                                     rows="10"
                                     rowsPerPageTemplate="5,10,20"
                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords}"
                                     emptyMessage="Nenhum livro encontrado."
                                     stripedRows="true"
                                     style="margin-top: 10px;">

                            <p:column headerText="Nº Registo" width="80" style="text-align:center;">
                                <h:outputText value="#{liv.idLivro}" />
                            </p:column>

                            <p:column headerText="Título do Livro"width="80"/>
                                <h:outputText value="#{liv.titulo}" />
                            </p:column>

                            <p:column headerText="Autor" width="120">
                                <h:outputText value="#{liv.autor}" />
                            </p:column>

                            <p:column headerText="Editora" width="80">
                                <h:outputText value="#{liv.editora}" />
                            </p:column>

                            <p:column headerText="Categoria">
                                <h:outputText value="#{liv.categoriaLivro.descricaoCategoriaLivro}" />
                            </p:column>

                            <p:column headerText="Prateleira">
                                <h:outputText value="#{liv.prateleira.classificacao}" />
                            </p:column>

                            <p:column headerText="Qtd" width="180" style="text-align:center;">
                                <h:outputText value="#{liv.quantidadeDisponivel}" />
                            </p:column>

                            <p:column headerText="Operações" width="150" style="text-align:center;">
                                <p:commandButton value="Editar"
                                                 action="#{livroBean.editar}"
                                                 styleClass="ui-button-warning"
                                                 style="margin-right: 5px;">
                                    <f:setPropertyActionListener value="#{liv}" target="#{livroBean.livroSelecionado}" />
                                </p:commandButton>
                                
                                <p:commandButton value="Eliminar"
                                                 action="#{livroBean.excluir}"
                                                 update="formTabela:tabela formPesquisa:growl"
                                                 styleClass="ui-button-danger">
                                    <f:setPropertyActionListener value="#{liv}" target="#{livroBean.livroSelecionado}" />
                                    <p:confirm header="Confirmação" message="Deseja mesmo eliminar este livro?" icon="pi pi-exclamation-triangle" />
                                </p:commandButton>
                            </p:column>

                        </p:dataTable>

                        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                            <p:commandButton value="Sim" type="button"
                                             styleClass="ui-confirmdialog-yes ui-button-danger"
                                             icon="pi pi-check" />
                            <p:commandButton value="Não" type="button"
                                             styleClass="ui-confirmdialog-no ui-button-secondary"
                                             icon="pi pi-times" />
                        </p:confirmDialog>

                    </h:form>

                </f:view>
            </ui:define>

        </ui:composition>
    </body>
</html>
