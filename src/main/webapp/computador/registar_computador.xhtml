<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

    <body>

        <ui:composition template="./../WEB-INF/templates/template_computador.xhtml">
            <ui:define name="content">
                <h:form id="frmComputador">
                    <p:growl id="msgs" showDetail="true" life="1000"/>

                    <p:panel header="#{computadorBean.computador.idEquipamento == null ? 'Cadastro de Novo Equipamento' : 'Editar Equipamento'}" 
                             style="max-width:600px; margin-bottom:20px;">
                        
                        <h:inputHidden value="#{computadorBean.computador.idEquipamento}" />

                        <h:panelGrid columns="2" cellpadding="7" style="width:100%;">

                            <h:outputLabel value="Referência do Equipamento (Etiqueta):" for="ref" />
                            <p:inputText id="ref" value="#{computadorBean.computador.refEquipamento}" 
                                         required="true" requiredMessage="A referência é obrigatória"
                                         style="width:100%" />

                            <h:outputLabel value="Localização (Sala / Setor):" for="localizacao"/>
                            <p:inputText id="localizacao" value="#{computadorBean.computador.localizacao}" 
                                         style="width:100%" />

                            <h:outputLabel value="Status Inicial:" for="status"/>
                            <p:selectOneMenu id="status" value="#{computadorBean.computador.status}" style="width:100%;">
                                <f:selectItem itemLabel="Disponível" itemValue="Disponível" />
                                <f:selectItem itemLabel="Em Uso" itemValue="Em Uso" />
                                <f:selectItem itemLabel="Manutenção" itemValue="Manutenção" />
                            </p:selectOneMenu>

                        </h:panelGrid>

                        <p:divider />

                        <div style="text-align: center; margin-top: 10px;">
                            <p:commandButton value="Guardar Equipamento" action="#{computadorBean.save}" 
                                             update="frmComputador" icon="pi pi-save" 
                                             styleClass="ui-button-success" style="margin-right: 10px;" />

                            <p:commandButton value="Limpar" action="#{computadorBean.limpar}" 
                                             update="frmComputador" icon="pi pi-refresh" 
                                             process="@this" styleClass="ui-button-secondary" />
                        </div>
                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </body>
</html>
