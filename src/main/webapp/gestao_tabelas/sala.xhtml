<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

    <body>

        <ui:composition template="./../WEB-INF/templates/template_gestao_tabelas.xhtml">

            <ui:define name="top">
                Cadastro de Sala
            </ui:define>


            <ui:define name="content">
                  <h:form id="frmSala">
                    <p:growl id="msgs" showDetail="true" life="3000"/>

                    <p:panel header="#{salaBean.sala.idSala == null ? 'Registar Nova Sala' : 'Editar Sala'}" 
                             style="max-width:800px; margin: 0 auto; margin-bottom:20px;">

                        <h:inputHidden value="#{salaBean.sala.idSala}" />

                        <h:panelGrid columns="2" cellpadding="7" style="width:100%;">

                            <h:outputLabel value="Código Interno (ID):" for="idSala" style="font-weight: bold;" rendered="#{salaBean.sala.idSala != null}" />
                            <p:inputText id="idSala" value="#{salaBean.sala.idSala}" readonly="true" style="width:100%" rendered="#{salaBean.sala.idSala != null}" />

                            <h:outputLabel value="Nome da Sala:" for="nomeSala" style="font-weight: bold;" />
                            <p:inputText id="nomeSala" value="#{salaBean.sala.nomeSala}" 
                                         required="true" requiredMessage="O nome da sala é obrigatório" style="width:100%"/>

                            <h:outputLabel value="Capacidade (Pessoas):" for="capacidade" style="font-weight: bold;" />
                            <p:inputNumber id="capacidade" value="#{salaBean.sala.capacidade}" 
                                           decimalPlaces="0"  style="width:100%"/>

                            <h:outputLabel value="Preço por Hora:" for="precoHora" style="font-weight: bold;" />
                            <p:inputNumber id="precoHora" value="#{salaBean.sala.precoHora}" 
                                           symbol=" Kz" symbolPosition="s" decimalPlaces="2" style="width:100%"/>

                            <h:outputLabel value="Status da Sala:" for="status" style="font-weight: bold;" />
                            <p:selectOneMenu id="status" value="#{salaBean.sala.status}" style="width:100%;">
                                <f:selectItem itemLabel="Disponível" itemValue="Disponível" />
                                <f:selectItem itemLabel="Ocupada" itemValue="Ocupada" />
                                <f:selectItem itemLabel="Manutenção" itemValue="Manutenção" />
                            </p:selectOneMenu>

                        </h:panelGrid>

                        <p:divider />

                        <div style="text-align: center; margin-top: 15px;">
                            <p:commandButton value="Guardar Sala" action="#{salaBean.salvar}" 
                                             update="frmSala" icon="pi pi-save" 
                                             styleClass="ui-button-success" style="margin-right: 10px;" />

                            <p:commandButton value="Limpar Novo" action="#{salaBean.limpar}" 
                                             update="frmSala" icon="pi pi-refresh" process="@this" 
                                             styleClass="ui-button-secondary" />
                        </div>
                    </p:panel>

                    <p:panel header="Salas Registadas" style="max-width:800px; margin: 0 auto;">
                        <p:dataTable id="tblSalas" value="#{salaBean.salas}" var="s" 
                                     emptyMessage="Nenhuma sala encontrada." rows="5" paginator="true" 
                                     paginatorPosition="bottom" reflow="true">
                            
                            <p:column headerText="ID" style="width: 10%; text-align: center; font-weight: bold;">
                                <h:outputText value="#{s.idSala}" />
                            </p:column>

                            <p:column headerText="NOME DA SALA" style="font-weight: bold;">
                                <h:outputText value="#{s.nomeSala}" />
                            </p:column>

                            <p:column headerText="CAPACIDADE" style="width: 20%; text-align: center; font-weight: bold;">
                                <h:outputText value="#{s.capacidade} pess." />
                            </p:column>

                            <p:column headerText="PREÇO / HORA" style="width: 20%; text-align: right; font-weight: bold;">
                                <h:outputText value="#{s.precoHora}">
                                    <f:convertNumber type="currency" currencySymbol="Kz" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="STATUS" style="width: 18%; text-align: center; font-weight: bold;">
                                <h:outputText value="#{s.status}" />
                            </p:column>

                            <p:column headerText="AÇÕES" style="width: 15%; text-align: center; font-weight: bold;">
                                <!-- Botão Editar -->
                                <p:commandButton icon="pi pi-pencil" update="frmSala" process="@this"
                                                 styleClass="ui-button-success ui-button-rounded ui-button-text" 
                                                 style="margin-right: 5px;">
                                    <f:setPropertyActionListener value="#{s}" target="#{salaBean.sala}" />
                                </p:commandButton>
                                
                                <!-- Botão Eliminar -->
                                <p:commandButton icon="pi pi-trash" action="#{salaBean.excluir}"
                                                 update="frmSala" process="@this"
                                                 styleClass="ui-button-danger ui-button-rounded ui-button-text">
                                    <f:setPropertyActionListener value="#{s}" target="#{salaBean.sala}" />
                                    <p:confirm header="Confirmação" message="Tem certeza que deseja eliminar esta sala?" icon="pi pi-exclamation-triangle" />
                                </p:commandButton>
                            </p:column>
                            
                        </p:dataTable>
                    </p:panel>

                    <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                        <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                        <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
                    </p:confirmDialog>

                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
