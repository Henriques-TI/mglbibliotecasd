<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <body>

        <ui:composition template="./../WEB-INF/templates/template_gestao_tabelas.xhtml">


            <ui:define name="content">
               <h:form id="formCadastroEmprestimo">
            <p:growl id="msges" showDetail="true" life="4000" />

            <p:panel header="Efetuar Novo Empréstimo de Livro" styleClass="painel-customizado" style="max-width: 600px; margin: 20px auto;">
                
                <h:panelGrid columns="2" cellpadding="5" style="width: 100%;">
                    
                    <p:outputLabel value="Livro a Emprestar:" for="comboLivro" />
                    <p:selectOneMenu id="comboLivro" value="#{emprestimoBean.emprestimo.livro.idLivro}" required="true" requiredMessage="Selecione um livro.">
                        <f:selectItem itemLabel="Selecione o livro..." itemValue="" noSelectionOption="true" />
                        <f:selectItems value="#{emprestimoBean.livrosDisponiveis}" var="l" 
                                       itemLabel="#{l.titulo} (Disponível: #{l.quantidadeDisponivel})" itemValue="#{l.idLivro}" />
                    </p:selectOneMenu>

                    <p:outputLabel value="Codigo do Utilizador / Cliente:" for="idUser" />
                    <p:inputNumber id="idUser" value="#{emprestimoBean.emprestimo.idUtilizador}" decimalPlaces="0" thousandSeparator="" required="true" requiredMessage="Informe o ID do utilizador." />

                    <p:outputLabel value="Data de Retirada:" for="dataRet" />
                    <p:datePicker id="dataRet" value="#{emprestimoBean.emprestimo.dataRetirada}" showTime="true" pattern="dd/MM/yyyy HH:mm" required="true" />

                    <p:outputLabel value="Devolução Prevista:" for="dataDev" />
                    <p:datePicker id="dataDev" value="#{emprestimoBean.emprestimo.dataDevolucaoPrevista}" pattern="dd/MM/yyyy" showIcon="true" required="true" requiredMessage="Informe a data prevista." />

                </h:panelGrid>

                <f:facet name="footer">
                    <p:commandButton value="Confirmar Empréstimo" action="#{emprestimoBean.salvar}" update="formCadastroEmprestimo" icon="pi pi-check" styleClass="ui-button-success" style="margin-right: .5rem;" />
                    <p:button value="Ver Histórico geral" outcome="lista_emprestimos" icon="pi pi-list" styleClass="ui-button-secondary" />
                </f:facet>
            </p:panel>
        </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
