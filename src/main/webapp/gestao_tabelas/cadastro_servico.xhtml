<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

    <body>

        <ui:composition template="./../WEB-INF/templates/template_gestao_tabelas.xhtml">

            <ui:define name="content">
                <h:form id="frmServico">
                    <p:growl id="msgs" showDetail="true" life="3000"/>

                    <p:panel header="#{servicoBean.servico.idServico == null ? 'Registar Novo Serviço' : 'Editar Serviço'}" 
                             style="max-width:800px; margin: 0 auto; margin-bottom:20px;">

                        <h:inputHidden value="#{servicoBean.servico.idServico}" />

                        <h:panelGrid columns="2" cellpadding="7" style="width:100%;">

                            <h:outputLabel value="Código Interno (ID):" for="idServico" style="font-weight: bold;" rendered="#{servicoBean.servico.idServico != null}" />
                            <p:inputText id="idServico" value="#{servicoBean.servico.idServico}" readonly="true" style="width:100%" rendered="#{servicoBean.servico.idServico != null}" />

                            <h:outputLabel value="Tipo de Serviço:" for="tipoServico" style="font-weight: bold;" />
                            <p:selectOneMenu id="tipoServico" value="#{servicoBean.servico.tipoServico}" required="true" requiredMessage="Selecione o tipo de serviço" style="width:100%;">
                                <f:selectItem itemLabel="-- Selecione o Tipo --" itemValue="" noSelectionOption="true" />
                                <f:selectItem itemLabel="Uso de Computador" itemValue="Uso de Computador" />
                                <f:selectItem itemLabel="Reserva de Sala" itemValue="Reserva de Sala" />
                                <f:selectItem itemLabel="Impressão / Cópia" itemValue="Impressão / Cópia" />
                                <f:selectItem itemLabel="Internet / Wi-Fi" itemValue="Internet / Wi-Fi" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Utilizador / Cliente:" for="utilizador" style="font-weight: bold;" />
                            <p:selectOneMenu id="utilizador" value="#{servicoBean.servico.utilizador}" 
                                             required="true" requiredMessage="Selecione o utilizador"
                                             converter="omnifaces.SelectItemsConverter" style="width:100%;">
                                <f:selectItem itemLabel="-- Selecione o Utilizador --" itemValue="" noSelectionOption="true" />
                                <f:selectItems value="#{servicoBean.servico.utilizador}" var="u" 
                                               itemLabel="#{u.nomeUtilizador}" itemValue="#{u}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Funcionário Responsável:" for="funcionario" style="font-weight: bold;" />
                            <p:selectOneMenu id="funcionario" value="#{servicoBean.servico.funcionario}" 
                                             required="true" requiredMessage="Selecione o funcionário"
                                             converter="omnifaces.SelectItemsConverter" style="width:100%;">
                                <f:selectItem itemLabel="-- Selecione o Funcionário --" itemValue="" noSelectionOption="true" />
                                <f:selectItems value="#{servicoBean.servico.funcionario}" var="f" 
                                               itemLabel="#{f.nomeFuncionario}" itemValue="#{f}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Sala (Se aplicável):" for="sala" style="font-weight: bold;" />
                            <p:selectOneMenu id="sala" value="#{servicoBean.servico.sala}" 
                                             converter="omnifaces.SelectItemsConverter" style="width:100%;">
                                <f:selectItem itemLabel="-- Nenhuma / Selecione se aplicável --" itemValue="#{null}" />
                                <f:selectItems value="#{servicoBean.servico.sala}" var="s" 
                                               itemLabel="#{s.nomeSala}" itemValue="#{s}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Computador (Se aplicável):" for="computador" style="font-weight: bold;" />
                            <p:selectOneMenu id="computador" value="#{servicoBean.servico.computador}" 
                                             converter="omnifaces.SelectItemsConverter" style="width:100%;">
                                <f:selectItem itemLabel="-- Nenhum / Selecione se aplicável --" itemValue="#{null}" />
                                <f:selectItems value="#{servicoBean.computadores}" var="c" 
                                               itemLabel="#{c.refEquipamento} (#{c.localizacao})" itemValue="#{c}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Qtd. Páginas (Impressão):" for="qtdPaginas" style="font-weight: bold;" />
                            <p:inputNumber id="qtdPaginas" value="#{servicoBean.servico.quantidadePaginas}" 
                                           decimalPlaces="0"  style="width:100%"/>

                            <h:outputLabel value="Data do Serviço:" for="dataServico" style="font-weight: bold;" />
                            <p:datePicker id="dataServico" value="#{servicoBean.servico.dataServico}" 
                                          pattern="dd/MM/yyyy" showIcon="true" required="true" 
                                          requiredMessage="A data é obrigatória" style="width:100%"/>

                            <h:outputLabel value="Hora Início (HH:mm):" for="horaInicio" style="font-weight: bold;" />
                            <p:inputMask id="horaInicio" value="#{servicoBean.servico.horaInicio}" mask="99:99" required="true" requiredMessage="Hora de início obrigatória" style="width:100%"/>

                            <h:outputLabel value="Hora Fim (HH:mm):" for="horaFim" style="font-weight: bold;" />
                            <p:inputMask id="horaFim" value="#{servicoBean.servico.horaFim}" mask="00:00" required="true" requiredMessage="Hora de término obrigatória" style="width:100%"/>

                            <h:outputLabel value="Custo Total:" for="custoTotal" style="font-weight: bold;" />
                            <p:inputNumber id="custoTotal" value="#{servicoBean.servico.custoTotal}" 
                                           symbol=" Kz" symbolPosition="s" decimalPlaces="2" style="width:100%"/>

                            <h:outputLabel value="Status do Serviço:" for="status" style="font-weight: bold;" />
                            <p:selectOneMenu id="status" value="#{servicoBean.servico.status}" style="width:100%;">
                                <f:selectItem itemLabel="Pendente" itemValue="Pendente" />
                                <f:selectItem itemLabel="Em Andamento" itemValue="Em Andamento" />
                                <f:selectItem itemLabel="Concluído" itemValue="Concluído" />
                                <f:selectItem itemLabel="Cancelado" itemValue="Cancelado" />
                            </p:selectOneMenu>

                        </h:panelGrid>

                        <p:divider />

                        <div style="text-align: center; margin-top: 15px;">
                            <p:commandButton value="Guardar Serviço" action="#{servicoBean.salvar}" 
                                             update="frmServico" icon="pi pi-save" 
                                             styleClass="ui-button-success" style="margin-right: 10px;" />

                            <p:commandButton value="Limpar Novo" action="#{servicoBean.limpar()}" 
                                             update="frmServico" icon="pi pi-refresh" process="@this" 
                                             styleClass="ui-button-secondary" />
                        </div>
                    </p:panel>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
