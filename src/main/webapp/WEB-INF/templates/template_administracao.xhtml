<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html">

    <h:head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <h:outputStylesheet name="estilo.css" library="css"/>
        <title>Gestão da Biblioteca</title>
    </h:head>
    
    <h:body>
        <div class="container">
            
            <header class="header">
                <ui:insert name="top">
                    <h1>📚 Gestão da Biblioteca</h1>
                    <p class="brand-group">Skylink</p>
                </ui:insert>
            </header>

            <!-- MENU LATERAL -->
            <nav class="nav">
                <ui:insert name="left">
                    <h3>Menu Principal</h3>
                    <ul>
                        <li><h:link value="🏠 Voltar ao Início" outcome="/index" /></li>
                        <li><h:link value="💻 Gestão de Computadores" outcome="/computador/index_computador"/></li>

                        <li><h:link value="📖 Gestão de Livros" outcome="/livro/index_livro"/></li>
                        <li><h:link value="🗄️ Gestão das Prateleiras" outcome="/prateleira/index_prateleira"/></li>
                        <li><h:link value="🏷️ Gestão das Categorias" outcome="/categoria/index_categoria"/></li>
                    </ul>
                </ui:insert>
            </nav>
            
            <main class="main">
                <ui:insert name="content">
                    <div class="welcome-container">
                        <h2>📊 Gestão Inteligente de Biblioteca</h2>
                        <p>Mais eficiência, organização e produtividade para a sua Biblioteca.</p>
                    </div>
                </ui:insert>
            </main>

            <footer class="footer">
                <ui:insert name="bottom">
                    <p>&copy; 2026 - Desenvolvido pelo grupo Skylink</p>
                    <p>📧 contato@exemplo.com | 📱 (244) 99999-9999</p>
                </ui:insert>
            </footer>
            
        </div>
