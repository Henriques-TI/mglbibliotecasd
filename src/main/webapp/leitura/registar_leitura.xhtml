<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">
          <link rel="stylesheet" href="../resources/css/estilo.css" type="text/css"/>


    <body>

        <ui:composition template="./../WEB-INF/templates/template_leitura.xhtml">

            <ui:define name="top">
                Gestão de Leituras / Empréstimos
            </ui:define>

            <ui:define name="content">
                <h:form id="frmCadastroLeitura"> 
                    <p:growl id="msgs" showDetail="true" life="3000"/>

                    <p:panel header="#{leituraBean.leitura.idLeitura == null ? 'Registar Nova Retirada (Leitura)' : 'Atualizar / Finalizar Leitura'}" 
                             style="max-width:800px; margin: 0 auto; margin-bottom:20px;">

                        <h:inputHidden value="#{leituraBean.leitura.idLeitura}" />

                        <h:panelGrid columns="2" cellpadding="7" style="width:100%;">

                            <h:outputLabel value="Código da Leitura:" for="idLeitura" style="font-weight: bold;" rendered="#{leituraBean.leitura.idLeitura != null}" />
                            <p:inputText id="idLeitura" value="#{leituraBean.leitura.idLeitura}" readonly="true" style="width:100%" rendered="#{leituraBean.leitura.idLeitura != null}" />

                            <h:outputLabel value="ID do Utilizador (Leitor):" for="idUtilizador" style="font-weight: bold;" />
                            <p:inputNumber id="idUtilizador" value="#{leituraBean.leitura.idUtilizador}" 
                                           required="true" requiredMessage="O ID do utilizador é obrigatório" 
                                           decimalPlaces="0" />

                            <h:outputLabel value="ID do Livro:" for="idLivro" style="font-weight: bold;" />
                            <p:inputNumber id="idLivro" value="#{leituraBean.leitura.idLivro}" 
                                           required="true" requiredMessage="O ID do livro é obrigatório" 
                                           decimalPlaces="0" style="width:100%"/>

                            <h:outputLabel value="ID do Funcionário Responsável:" for="idFuncionario" style="font-weight: bold;" />
                            <p:inputNumber id="idFuncionario" value="#{leituraBean.leitura.idFuncionario}" 
                                           required="true" requiredMessage="O ID do funcionário é obrigatório" 
                                           decimalPlaces="0" style="width:100%"/>

                            <h:outputLabel value="Data de Retirada:" for="dataRetirada" style="font-weight: bold;" />
                            <p:datePicker id="dataRetirada" value="#{leituraBean.leitura.dataRetirada}" 
                                          showTime="true" pattern="dd/MM/yyyy HH:mm"
                                          required="true" requiredMessage="A data de retirada é obrigatória" style="width:100%"/>

                            <h:outputLabel value="Devolução Prevista:" for="dataPrevista" style="font-weight: bold;" />
                            <p:datePicker id="dataPrevista" value="#{leituraBean.leitura.dataDevolucaoPrevista}" 
                                          showTime="true" pattern="dd/MM/yyyy HH:mm"
                                          required="true" requiredMessage="A data de devolução prevista é obrigatória" style="width:100%"/>

                            <h:outputLabel value="Devolução Realizada:" for="dataReal" style="font-weight: bold;" rendered="#{leituraBean.leitura.idLeitura != null}" />
                            <p:datePicker id="dataReal" value="#{leituraBean.leitura.dataDevolucaoReal}" 
                                          showTime="true" pattern="dd/MM/yyyy HH:mm"
                                          rendered="#{leituraBean.leitura.idLeitura != null}" style="width:100%"/>

                            <h:outputLabel value="Estado da Leitura (Status):" for="status" style="font-weight: bold;" />
                            <p:selectOneMenu id="status" value="#{leituraBean.leitura.status}" style="width:100%;">
                                <f:selectItem itemLabel="Em Andamento" itemValue="Em Andamento" />
                                <f:selectItem itemLabel="Concluída" itemValue="Concluída" />
                                <f:selectItem itemLabel="Atrasada" itemValue="Atrasada" />
                                <f:selectItem itemLabel="Cancelada" itemValue="Cancelada" />
                            </p:selectOneMenu>

                        </h:panelGrid>
                        
                        <p:divider />

                        <div style="text-align: center; margin-top: 15px;">
                            <p:commandButton value="Guardar Registo" action="#{leituraBean.salvar}" 
                                             update="frmCadastroLeitura" icon="pi pi-save" 
                                             styleClass="ui-button-success" style="margin-right: 10px;" />

                            <p:commandButton value="Limpar Formulário" action="#{leituraBean.limpar}" 
                                             update="frmCadastroLeitura" icon="pi pi-refresh" process="@this" 
                                             styleClass="ui-button-secondary" />
                        </div>
                    </p:panel>
                </h:form>
            </ui:define>

        </ui:composition>

    </body>
</html>
